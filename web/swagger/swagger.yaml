openapi: 3.0.3
info:
  title: Vacancies API - учебный проект для экзамена
  description: |
    REST-сервис управления вакансиями. Учебный пример на Yii2 + MySQL.

    Три эндпоинта:
    - `GET /api/vacancies` - список с сортировкой и пагинацией
    - `GET /api/vacancies/{id}` - одна вакансия
    - `POST /api/vacancies` - создание новой вакансии

    Попробуйте каждый эндпоинт через кнопку **Try it out** - увидите живой ответ сервера.
    Эту страницу можно показать на защите как живую документацию проекта.
  version: "1.0.0"

servers:
  - url: http://localhost:18080
    description: Локальный стенд (через nginx)
  - url: http://localhost:8080
    description: Backend напрямую (через пробитый порт)

paths:
  /api/vacancies:
    get:
      summary: Список вакансий
      description: |
        Возвращает массив вакансий. Пагинация и сортировка задаются query-параметрами.
        Метаданные пагинации - в HTTP-заголовках `X-Pagination-*` (стандарт RFC5988).
      parameters:
        - name: sort
          in: query
          description: |
            Поле сортировки. Префикс `-` для DESC.
            Разрешено: `title`, `-title`, `salary`, `-salary`, `created_at`, `-created_at`.
          schema:
            type: string
            example: -created_at
        - name: page
          in: query
          description: Номер страницы, начиная с 1.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per-page
          in: query
          description: Размер страницы (максимум 50).
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Массив вакансий + мета-заголовки
          headers:
            X-Pagination-Total-Count:
              schema: { type: integer }
              description: Общее количество записей
            X-Pagination-Page-Count:
              schema: { type: integer }
              description: Количество страниц
            X-Pagination-Current-Page:
              schema: { type: integer }
              description: Текущая страница
            X-Pagination-Per-Page:
              schema: { type: integer }
              description: Записей на страницу
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vacancy'

    post:
      summary: Создать вакансию
      description: |
        Создаёт новую вакансию. Все три поля обязательны.
        При ошибках валидации возвращает 422 с массивом `[{field, message}]`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacancyInput'
      responses:
        '201':
          description: Вакансия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vacancy'
        '422':
          description: Ошибки валидации
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ValidationError'

  /api/vacancies/{id}:
    get:
      summary: Получить вакансию по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Идентификатор вакансии
      responses:
        '200':
          description: Вакансия найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vacancy'
        '404':
          description: Вакансия не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/health:
    get:
      summary: Проверка живости сервиса
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: vacancies-api }
                  time: { type: string, format: date-time }
                  php: { type: string, example: 8.1.34 }

components:
  schemas:
    Vacancy:
      type: object
      properties:
        id:
          type: integer
          example: 42
        title:
          type: string
          example: Middle PHP-разработчик
        description:
          type: string
          example: Yii2, Laravel, MySQL, Docker
        salary:
          type: integer
          example: 180000
        created_at:
          type: string
          format: date-time
          example: "2026-04-24 16:51:35"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-24 16:51:35"

    VacancyInput:
      type: object
      required: [title, description, salary]
      properties:
        title:
          type: string
          maxLength: 255
          example: Frontend Vue 3 разработчик
        description:
          type: string
          example: Опыт Nuxt 3 + TypeScript
        salary:
          type: integer
          minimum: 0
          maximum: 10000000
          example: 200000

    ValidationError:
      type: object
      properties:
        field:
          type: string
          example: title
        message:
          type: string
          example: Поле «Название» обязательно

    Error:
      type: object
      properties:
        name: { type: string }
        message: { type: string }
        code: { type: integer }
        status: { type: integer }
