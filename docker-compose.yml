# Backend stack: MySQL + Yii2 API.
# Запуск: cp .env.example .env && docker compose up -d --build
# После запуска API на http://localhost:8080/api

services:
  mysql:
    image: mysql:8.0
    container_name: vacancies-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      # Порт на хост-машине настраивается через .env (MYSQL_HOST_PORT).
      # По умолчанию 3306, но если у вас уже есть локальный MySQL на 3306
      # (типичная ошибка "port is already allocated"), поменяйте в .env
      # на 3307 или другой свободный.
      - "${MYSQL_HOST_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vacancies-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      YII_ENV: dev
      YII_DEBUG: 'true'
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql-data:
